name: "[cc-mudjacking] Perform release"

# On merge to main: build + push the GHCR image, then open an image-bump PR in
# illustrious.infrastructure (envs/production/cc-mudjacking/values.yaml). Merging
# that deploys via ArgoCD (cc-mudjacking is autoSync). Mirrors the platform repo's
# publish.yml — GHCR by immutable SHA + infra deploy-PR (keeps infra's review gate;
# never pushes to infra main directly).

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  image:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    env:
      SPACE_URL: https://${{ secrets.SPACE_NAME }}.${{ secrets.SPACE_REGION }}.digitaloceanspaces.com
      # reCAPTCHA v3 SITE key (public — embedded in client HTML). The platform
      # holds the matching SECRET and verifies tokens server-side.
      NEXT_PUBLIC_RECAPTCHA_SITE_KEY: "6Lc7uBQtAAAAAO6_0t9kKA4jGA5Gq8E_RTpmtfxp"
      IMAGE: ghcr.io/illustrious-online/cc-mudjacking
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Build-only dependency files (gitignored): Sentry instrumentation +
      # config, plus the production .env baked into the image at build time.
      - name: Install spaces-cli
        run: bun install -g spaces-cli
      - name: Download dependency files
        run: |
          spaces-cli down $SPACE_URL/instrumentation.ts -k ${{ secrets.SPACE_SECRET }} -i ${{ secrets.SPACE_KEY }}
          spaces-cli down $SPACE_URL/instrumentation-client.ts -k ${{ secrets.SPACE_SECRET }} -i ${{ secrets.SPACE_KEY }}
          spaces-cli down $SPACE_URL/cc-mudjacking/sentry.edge.config.ts -k ${{ secrets.SPACE_SECRET }} -i ${{ secrets.SPACE_KEY }}
          spaces-cli down $SPACE_URL/cc-mudjacking/sentry.server.config.ts -k ${{ secrets.SPACE_SECRET }} -i ${{ secrets.SPACE_KEY }}
          spaces-cli down $SPACE_URL/cc-mudjacking/production.env -o ./.env -k ${{ secrets.SPACE_SECRET }} -i ${{ secrets.SPACE_KEY }}
      - name: Install Dependencies
        run: bun install --frozen-lockfile
      - name: Run unit tests
        run: bun run test
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          flags: cc-mudjacking
          files: ./coverage/lcov-report/index-lcov.html
          slug: Illustrious-Online/cc-mudjacking
      # Build via the Docker CLI (preinstalled) — no third-party action, stays
      # within the org Actions allowlist. ORGANIZATION_ID / API_BASE_URL are
      # runtime container env (set in the infra chart values), not baked here.
      - name: Build & push GHCR image
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker build \
            --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY="$NEXT_PUBLIC_RECAPTCHA_SITE_KEY" \
            -t "$IMAGE:latest" -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:latest"
          docker push "$IMAGE:${{ github.sha }}"

  # Open the infra image-bump PR. Needs INFRA_DEPLOY_TOKEN (fine-grained PAT on
  # illustrious.infrastructure: Contents + Pull requests write). No-ops on the
  # first run until envs/production/cc-mudjacking/values.yaml exists.
  deploy-pr:
    needs: image
    runs-on: ubuntu-latest
    steps:
      - name: Open infra image-bump PR
        env:
          GH_TOKEN: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "INFRA_DEPLOY_TOKEN not set — skipping deploy PR." >&2
            exit 0
          fi
          owner=Illustrious-Online; repo=illustrious.infrastructure
          git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${owner}/${repo}.git" infra
          cd infra
          values="envs/production/cc-mudjacking/values.yaml"
          if [ ! -f "$values" ]; then
            echo "$values not present yet — bootstrap it manually for the first deploy. Skipping." >&2
            exit 0
          fi
          git config user.name "illustrious-deploy"
          git config user.email "deploy@illustrious.online"
          branch="deploy/cc-mudjacking-${SHA}"
          git checkout -b "$branch"
          SHA="$SHA" yq -i '.image.tag = strenv(SHA)' "$values"
          if [ -z "$(git status --porcelain)" ]; then
            echo "Tag already at ${SHA}."; exit 0
          fi
          git commit -aqm "chore(deploy): bump cc-mudjacking to ${SHA}"
          git push -u origin "$branch"
          gh pr create --repo "${owner}/${repo}" \
            --title "chore(deploy): bump cc-mudjacking to ${SHA:0:7}" \
            --body "Automated image bump from cc-mudjacking@\`${SHA}\`. Merging deploys to v1 via ArgoCD auto-sync." \
            --head "$branch" --base main
